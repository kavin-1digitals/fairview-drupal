services:
  web:
    build:
      context: .
    depends_on:
      - db
    ports:
      - "${WEB_PORT:-8003}:80"
    environment:
      DRUPAL_DB_HOST: db
      DRUPAL_DB_NAME: fairview
      DRUPAL_DB_USER: fairview
      DRUPAL_DB_PASSWORD: fairview
      DRUPAL_HASH_SALT: "${DRUPAL_HASH_SALT:-fairview-local-demo-change-me}"
      DRUPAL_TRUSTED_HOST_PATTERN: "${DRUPAL_TRUSTED_HOST_PATTERN:-.*}"
    volumes:
      - drupal-files:/var/www/html/web/sites/default/files
      - ./data:/var/www/html/data:ro

  db:
    image: mariadb:11.8
    environment:
      MARIADB_DATABASE: fairview
      MARIADB_USER: fairview
      MARIADB_PASSWORD: fairview
      MARIADB_ROOT_PASSWORD: fairview-root
    volumes:
      - db-data:/var/lib/mysql
      - ./data/fairview-db.sql.gz:/docker-entrypoint-initdb.d/01-fairview-db.sql.gz:ro

volumes:
  db-data:
  drupal-files:
