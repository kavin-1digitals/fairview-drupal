drupal/drupal_cms_accessibility_tools:
  title: 'Accessibility Tools'
  type: recipe
  logo: https://git.drupalcode.org/project/editoria11y/-/avatar
  core: '^11.3'
  machineName: drupal_cms_accessibility_tools
  body:
    summary: 'Adds automated checks to help ensure content conforms to web accessibility guidelines.'
  packageName: drupal/drupal_cms_accessibility_tools

drupal/drupal_cms_ai:
  title: 'AI Assistant'
  type: recipe
  logo: null
  core: '^11.3'
  machineName: drupal_cms_ai
  body:
    summary: 'Adds integration with AI services, such as alt text generation and a chat bot to assist with site building. Requires an API key from Open AI or Anthropic.'
  packageName: drupal/drupal_cms_ai

drupal/drupal_cms_google_analytics:
  title: 'Google Tag'
  type: recipe
  logo: https://git.drupalcode.org/project/google_tag/-/avatar
  core: '^11.3'
  machineName: drupal_cms_google_analytics
  body:
    summary: 'Adds Google Tag and Google Tag Manager to use Google measurement and advertising products like Google Ads, Google Analytics, Campaign Manager, Display & Video 360, and Search Ads 360. Requires a Google Tag or GTM ID.'
  packageName: drupal/drupal_cms_google_analytics

drupal/mailchimp_signup_forms:
  title: 'Mailchimp'
  type: recipe
  logo: https://git.drupalcode.org/project/mailchimp/-/avatar
  core: '>=11.2'
  machineName: mailchimp_signup_forms
  body:
    summary: 'Adds integration with Mailchimp, creating signup forms for each audience. Requires authentication with Mailchimp.'
  packageName: drupal/mailchimp_signup_forms

drupal/stripe_webform_donation:
  title: 'Stripe Donation Form'
  url: https://www.drupal.org/project/stripe_webform_donation
  type: recipe
  logo: https://git.drupalcode.org/project/stripe_webform_donation/-/avatar
  core: '^11.3'
  machineName: stripe_webform_donation
  body:
    summary: 'Adds a simple form to accept one-time donations via the Stripe payment platform. Requires Stripe API keys.'
  packageName: drupal/stripe_webform_donation

drupal/cwo_demo:
  title: 'Commerce Donation Forms'
  url: https://www.drupal.org/project/cwo_demo
  type: recipe
  logo: https://git.drupalcode.org/project/cwo_demo/-/avatar
  core: '^11.3'
  machineName: cwo_demo
  body:
    summary: 'Provides more complex donation forms via Drupal Commerce, including support for recurring donations and integration with many payment gateways. Some setup is required.'
  packageName: drupal/cwo_demo
