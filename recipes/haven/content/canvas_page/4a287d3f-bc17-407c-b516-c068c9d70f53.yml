      component_id: sdc.haven_theme.text
      inputs:
        text:
          value: '<p>Jordan has spent 15 years working at the intersection of environmental policy and grassroots organizing. Before joining Haven, they led statewide campaigns on clean energy access and helped pass landmark emissions legislation in two states. Jordan believes that the most effective climate solutions are the ones communities build for themselves.</p>'
