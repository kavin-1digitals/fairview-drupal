      value: 'Tomás Reyes'
  field_content:
    -
      value: '<p>In the scientific literature, coral bleaching events are described in terms of degree heating weeks — a measure of how much thermal stress an ocean region has accumulated over time. When that figure crosses a certain threshold, corals begin to expel the symbiotic algae living in their tissues. Without those algae, which give corals both their color and the majority of their energy, the coral turns white. If the heat stress doesn''t ease within weeks, the coral dies.</p><p>This is not a metaphor or a projection. It is a process that researchers have been documenting with increasing frequency since the 1980s, and the data from the past decade in particular have been stark. The fourth global bleaching event, confirmed in 2024, affected reef systems across every ocean basin simultaneously — a pattern that was considered essentially impossible under pre-industrial climate conditions.</p><drupal-media data-entity-type="media" data-entity-uuid="ed7afc8f-95d9-4758-879c-edc9faa8fa96" data-align="center">&nbsp;</drupal-media><p>The reason reefs matter beyond their extraordinary biodiversity — though that alone should be sufficient — is that they are among the most sensitive climate indicators we have. Corals are biological archives. Their skeletons record sea surface temperatures, salinity, and ocean chemistry as they grow, laying down annual bands the way trees lay down rings. Paleoclimatologists have used coral cores to reconstruct climate conditions going back hundreds of years, well before the era of instrumental measurement. What those records now show, set against the modern monitoring data, is a system moving outside the range of anything in the recent geological past.</p><p>Ocean acidification compounds the bleaching threat in ways that are easy to underestimate. As the ocean absorbs carbon dioxide from the atmosphere, it becomes more acidic, and more acidic water is corrosive to the calcium carbonate structures that reefs are built from. Corals can still grow under moderately acidic conditions, but they do so more slowly and produce weaker skeletons. A reef stressed by acidification is less resilient when a bleaching event arrives.</p><p>There is research being done on heat-tolerant coral strains, on assisted evolution, on the possibility of interventions that could buy reefs time while emissions are reduced. Some of this work is genuinely promising. But the scientists conducting it are generally the first to say that no intervention at the reef level substitutes for addressing the underlying cause. The reefs are not a problem to be engineered around. They are an indicator of the broader problem — and what they''re currently indicating is that the window for effective action is measurably narrower than it was even five years ago.</p><p>For those who find data more legible than argument, the reefs are as clear a signal as the climate system produces.</p>'
      format: content_format
  field_description:
    -
      value: 'Coral reefs are among the most sensitive indicators of ocean health. What decades of monitoring data reveal about the state of our seas — and what comes next.'
