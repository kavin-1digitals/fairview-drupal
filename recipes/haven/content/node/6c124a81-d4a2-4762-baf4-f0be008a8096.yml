  field_content:
    -
      value: '<h2>Meet our specialist</h2><p>Dr. Alice Grossmann is a prominent climate scientist with more than 15 years of expertise in atmospheric modeling and strategies for mitigating climate change. Her innovative research on carbon capture in urban settings has shaped policy decisions in over 30 cities around the globe. As the Chief Climate Scientist at the International Climate Research Institute, she oversees a team of 40 researchers dedicated to creating cutting-edge solutions for reducing greenhouse gas emissions.</p><p>Dr. Grossmann has authored over 80 peer-reviewed articles in esteemed journals such as Nature Climate Change and Science. She is a member of the UN''s Intergovernmental Panel on Climate Change and contributed as a lead author to the most recent IPCC report. Her investigations into feedback mechanisms in Arctic permafrost led to her receiving the distinguished MacArthur Fellowship in 2021.</p><h2>Awards and recognition</h2><ul><li data-list-item-id="ee283f473ccdac8c61637a579bbb64e9f">MacArthur Fellowship (2021)</li><li data-list-item-id="e4a90e981707d2885143f7bd72a203dab">National Science Foundation</li><li data-list-item-id="e8ee7969e7c0309659ad7caf67ad13d30">CAREER Award (2019)&nbsp;</li><li data-list-item-id="e9533f3e63318cac025be878582301c76">Climate Breakthrough Award (2020)&nbsp;</li><li data-list-item-id="e653408ce6b097b1a2ee79a4ed40c2c9d">Time Magazine 100 Most Influential People in Climate Action (2022)</li></ul>'
      format: content_format
