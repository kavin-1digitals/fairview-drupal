      value: 'Priya Anand'
  field_content:
    -
      value: '<p>When people think about climate policy, they tend to think big: international agreements, federal legislation, sweeping industrial reform. These things matter enormously. But there''s a level of government far closer to home that has real, underused power to accelerate the transition to a cleaner economy — and that''s your local council.</p><p>Municipalities control land use and zoning, which means they decide where housing gets built, how dense it is, and whether new developments are required to meet energy efficiency standards. They manage public transport contracts, cycling infrastructure, and pedestrian networks. They own and operate public buildings, vehicle fleets, and waste systems. In many places, they also have influence over local energy procurement.</p><drupal-media data-entity-type="media" data-entity-uuid="b4fd62ce-ed37-4898-a299-9e6149dae3e5" data-align="center">&nbsp;</drupal-media><p>None of this is small. Taken together, local decisions shape the daily emissions of millions of people — the commutes they take, the homes they heat, the food systems that serve them.</p><p>The good news is that councils are also among the most accessible points of democratic influence. You can attend planning meetings. You can speak at public hearings. You can write directly to elected representatives who are, in most cases, genuinely reachable in a way that national politicians rarely are.</p><p>A few things are worth knowing before you engage. Councils often respond better to specific, well-evidenced asks than to general calls for action. If you want your council to adopt a climate action plan, pointing to neighbouring councils that have already done so — and the resources they used — makes the ask concrete and achievable. If you want tighter efficiency standards for new builds, knowing which planning committee holds that brief, and when they next meet, puts you in the right room.</p><p>You don''t need to become a full-time campaigner to make a difference at this level. A well-timed letter, a room full of engaged residents at a planning meeting, or even a conversation with a local councillor at a community event can shift how a decision gets made.</p><p>The climate crisis will not be solved by local government alone. But it also will not be solved without it.</p>'
      format: content_format
  field_description:
    -
      value: "National policy matters, but local government has more power to drive climate action than most people realize. Here's where to start"
