  field_content:
    -
      value: "<p>The south side of the city had some of the highest energy costs and lowest household incomes in the region. It also had a lot of south-facing rooftops and a community organizer who had spent three years asking why the clean energy transition seemed to be happening everywhere except where people needed it most.</p><p>The cooperative he helped found began with a simple premise: the financial and organizational barriers that prevent renters and low-income homeowners from accessing solar aren't technical problems. They're structural ones, and they can be solved with the right combination of community ownership, patient capital, and municipal partnership.</p><p>The model they developed was a virtual net metering arrangement. Solar arrays were installed on the rooftops of community buildings — a church, two community centers, and a disused warehouse whose roof was leased from the city at a peppercorn rate — and the electricity generated was credited proportionally to participating households' utility bills, regardless of whether those households had suitable roofs of their own. Renters could participate. Households in apartment buildings could participate. The benefit followed the member, not the property.</p><p>Financing was structured to front-load benefit for the lowest-income participants. A sliding-scale contribution model meant that higher-income members of the cooperative cross-subsidized access for those who could contribute least. Grant funding from a state clean energy equity program covered a significant portion of installation costs, and a community development financial institution provided the remainder as a low-interest loan repaid through the cooperative's revenues.</p><p>The first arrays came online in the spring of the project's third year. By the end of year four, 340 households were receiving bill credits averaging $180 per year — modest individually, but meaningful at the household level and significant in aggregate. A waiting list of over 200 households pointed toward the appetite for expansion.</p><p>What the project demonstrated, perhaps as importantly as the energy numbers, was that community energy can be organized in a way that actively inverts the usual pattern of clean energy benefit — where savings and assets tend to flow toward those who already have capital. That inversion didn't happen automatically. It required deliberate structural choices at every stage. But it happened, and it is now being used as a model by cooperative developers in three other cities who have visited the project and gone home to adapt it for their own contexts.</p>"
      format: content_format
  field_description:
    -
      value: 'A neighborhood energy cooperative in a post-industrial city brought solar power to 340 households — prioritizing renters and low-income residents often left out of the clean energy transition.'
