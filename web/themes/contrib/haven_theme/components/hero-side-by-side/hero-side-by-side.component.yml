"$schema": "https://git.drupalcode.org/project/drupal/-/raw/HEAD/core/assets/schemas/v1/metadata.schema.json"
name: Hero side-by-side
description: Hero with side-by-side slots for media and content.
group: Hero
props:
  type: object
  required:
    - image_position
    - hero_flex_direction_mobile
  properties:
    hero_flex_direction_mobile:
      type: string
      title: Mobile flex direction
      enum:
        - vertical
        - vertical-reverse
      meta:enum:
        vertical: Vertical
        vertical-reverse: Reverse vertical
      default: vertical
      examples:
        - "vertical"
    background:
      type: string
      title: Background color
      enum:
        - primary
        - white
        - secondary
        - accent
      meta:enum:
        primary: Primary
        white: White
        secondary: Secondary
        accent: Accent
    padding:
      type: boolean
      title: Padding
      examples:
        - false
    image_size:
      type: string
      title: Aspect ratio
      enum:
        - "2:1"
        - "16:9"
        - "3:2"
        - "4:3"
        - "1:1"
      meta:enum:
        "2:1": 2 × 1
        "16:9": 16 × 9
        "3:2": 3 × 2
        "4:3": 4 × 3
        "1:1": Square
      default: "4:3"
      examples:
        - "4:3"
    image_position:
      type: string
      title: Image position
      enum:
        - left
        - right
      meta:enum:
        left: Left
        right: Right
      default: left
      examples:
        - "left"
    media:
      $ref: json-schema-definitions://canvas.module/image
      title: Image
      type: object
      examples:
        - src: "assets/gradient-yellow.jpg"
          alt: "Yellow to blue gradient placeholder image"
          width: 800
          height: 600
slots:
  hero_slot:
    title: "Content"
