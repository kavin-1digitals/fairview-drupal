$schema: https://git.drupalcode.org/project/drupal/-/raw/HEAD/core/assets/schemas/v1/metadata.schema.json
name: Canvas test SDC for image gallery (nonsensical — at most 1 image)
props:
  type: object
  required:
    - images
  properties:
    caption:
      type: string
      title: Caption
      description: The image gallery caption
    images:
      title: 'Images for an egocentric gallery'
      type: array
      minItems: 1
      # This is the key difference between this SDC and the `image-gallery` one.
      maxItems: 1
      items:
        $ref: json-schema-definitions://canvas.module/image
        # @todo `type: object` should not be necessary, it's because \Drupal\sdc\Component\ComponentValidator::getClassProps() does not yet support $ref
        type: object
      examples:
        - - src: gracie-judging.jpg
            alt: 'A good, but judgmental dog'
            width: 600
            height: 839
