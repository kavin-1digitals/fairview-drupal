phpstan-is-up-to-date:
  stage: development
  rules:
    - if: $CI_PIPELINE_SOURCE == "schedule"
    - *manual-rule
  script:
    - |
      unset COMPOSER_IGNORE_PLATFORM_REQS

      # PHPStan packages in composer.json to check for updates.
      PACKAGES="phpstan/phpstan jangregor/phpstan-prophecy mglaman/phpstan-drupal phpat/phpat phpstan/phpstan-strict-rules"
      cp composer.json composer.json.orig

      for PKG in $PACKAGES; do
        # Query Packagist for the latest stable version.
        LATEST=$(composer show --all --format=json --no-interaction "$PKG" | jq -r '.versions[] | select(test("(alpha|beta|RC|rc|dev|patch)"; "i") | not)' | head -n1)

        if [ -z "$LATEST" ]; then
          echo "⚠️  Could not determine latest version for $PKG, skipping."
          continue
        fi

        echo "📦 $PKG: latest=$LATEST"
        composer require --dev --no-update --no-interaction "$PKG:$LATEST"
      done

      if ! diff -q composer.json composer.json.orig > /dev/null; then
        echo ""
        echo "🔥🔥🔥🔥🔥🔥🔥🔥🔥🔥🔥🔥🔥🔥🔥🔥🔥🔥"
        echo "PHPStan dependencies are outdated. Diff:"
        echo ""
        diff -u composer.json.orig composer.json || true
        echo ""
        echo "Updated composer.json is available in the artifacts."
        exit 1
      else
        echo ""
        echo "👍👍👍👍👍👍👍👍👍👍👍👍👍👍👍👍👍👍"
        echo "All PHPStan dependencies are up to date."
      fi
  artifacts:
    when: on_failure
    expire_in: 6 mos
    paths:
      - composer.json
  # Allow this to fail, to avoid disrupting Canvas's CI when upstream changes.
  allow_failure: true

phpcs-rules-match-drupal-11:
  stage: development
  rules:
    - if: $CI_PIPELINE_SOURCE == "schedule"
    - *manual-rule
  script:
    - |
      # Download the file from the Drupal repository
      curl -o drupal_core_phpcs.xml.dist https://git.drupalcode.org/project/drupal/-/raw/11.x/core/phpcs.xml.dist?ref_type=heads

      # Check if the download was successful
      if [ $? -ne 0 ]; then
        echo "🔥🔥🔥🔥🔥🔥🔥🔥🔥🔥🔥🔥🔥🔥🔥🔥🔥🔥"
        echo "Error: Failed to download $DRUPAL_URL"
        exit 1
      fi

      # Compare the downloaded file with the local file using a subshell to prevent premature exit
      echo "Comparing downloaded file with local file..."
      # With uses the braces the job just ends here for some reason.
       {
        diff drupal_core_phpcs.xml.dist core.phpcs.xml.dist
        DIFF_EXIT_CODE=$?
      } || true

      if [ $DIFF_EXIT_CODE -ne 0 ]; then
        echo "🔥🔥🔥🔥🔥🔥🔥🔥🔥🔥🔥🔥🔥🔥🔥🔥🔥🔥"
        echo "Error: core.phpcs.xml.dist not up to date with Drupal 11.x core/phpcs.xml.dist. Please create an issue to update this file."
        echo "Issue template: https://www.drupal.org/node/add/project-issue/canvas?title=Update%20PHPCS%20config%20to%20match%20Drupal%2011&field_issue_parent=3512890&clone_body=1&categories=2&priorities=100&status=1&version=1.x-dev&component=Code&assigned=0&tags="
      else
        echo "👍👍👍👍👍👍👍👍👍👍👍👍👍👍👍👍👍👍"
        echo "core.phpcs.xml.dist is up to date with Drupal 11.x core/phpcs.xml.dist"
      fi

      # Exit with the exit code of the diff command
      exit $DIFF_EXIT_CODE
  # Allow this to fail, to avoid disrupting Canvas's CI when upstream changes.
  allow_failure: true

phpunit (11.2, sqlite):
  rules:
    - *is-nightly-scheduled-rule
    - *backend-files-change-rule
    # Changes to the infra for running PHPUnit itself also need to trigger CI.
    - if: $CI_PIPELINE_SOURCE == "merge_request_event" && ($_FOR_EVERY_MR_COMMIT == "true" || $_FOR_EVERY_MR_COMMIT == null)
      changes:
        - .env.defaults
        - phpunit.xml.dist
    - *manual-rule
  image: ghcr.io/drupal-canvas/drupal-testing:2.1.1
  needs: []
  parallel:
    matrix:
      # The KUBERNETES_CPU_REQUEST and DRUPAL_TEST_CONCURRENCY values match core.
      - PHPUNIT_TESTSUITE: 'PHPUnit-Unit'
        KUBERNETES_CPU_REQUEST: "4"
        DRUPAL_TEST_CONCURRENCY: '24'
      - PHPUNIT_TESTSUITE: 'PHPUnit-Kernel'
        CI_PARALLEL_NODE_INDEX: ['1', '2', '3']
        CI_PARALLEL_NODE_TOTAL: '3'
        KUBERNETES_CPU_REQUEST: "10"
        DRUPAL_TEST_CONCURRENCY: '20'
      - PHPUNIT_TESTSUITE: 'PHPUnit-Functional'
        KUBERNETES_CPU_REQUEST: "20"
        DRUPAL_TEST_CONCURRENCY: '14'
  variables:
    DRUPAL_TEST_WEBSERVER_USER: www-data
  before_script:
    - !reference [ .drupal-with-dev-dependencies ]
    - !reference [ .canvas-ui ]
    # Forward-port upstream fix for https://www.drupal.org/project/drupal/issues/3582249
    # (PHPUnit SourceMapper races with concurrent test cleanup under sites/simpletest,
    # causing "RecursiveDirectoryIterator: Failed to open directory" random failures).
    # Fixed on Drupal 11.x (commit 3753f904, 2026-03-30); not yet in 11.2.x. Idempotent —
    # becomes a no-op once the minimum supported core version ships the fix.
    - sed -i '\|<directory>\.\./sites</directory>|d' $CI_PROJECT_DIR/_drupal/web/core/phpunit.xml.dist

  script:
    - !reference [ .test_runner ]
    - run_test "phpunit" "composer run phpunit -- --types $PHPUNIT_TESTSUITE --ci-parallel-node-index $CI_PARALLEL_NODE_INDEX --ci-parallel-node-total $CI_PARALLEL_NODE_TOTAL"
    - !reference [ .test_summary ]
  after_script:
    - cp -R _drupal/web/modules/contrib/$CI_PARENT_PROJECT_NAME/test-results $CI_PROJECT_DIR/test-results
    - cp -R _drupal/web/sites/simpletest/browser_output $CI_PROJECT_DIR/test-results || true
    - |
      cat > $CI_PROJECT_DIR/test-results/links.json << EOF
      {
        "PHPUnit test report": [
          {
            "external_link": {
              "label": "PHPUnit browser output ($PHPUNIT_TESTSUITE)",
              "url": "${CI_SERVER_URL}/${CI_PROJECT_NAMESPACE}/${CI_PROJECT_NAME}/-/jobs/${CI_JOB_ID}/artifacts/browse/test-results/browser_output"
            }
          }
        ]
      }
      EOF
  artifacts:
    expose_as: 'PHPUnit tests'
    when: always
    expire_in: 6 mos
    paths:
      - test-results/
    reports:
      junit:
        - test-results/*.xml
      annotations: test-results/links.json

phpunit (11.2, mariadb 10.6):
  extends: phpunit (11.2, sqlite)
  # Only run on nightly, not on push to 1.x — the PHPUnit 11.3 CI jobs already test all DBs, do not repeat for 11.2.
  rules:
    - *is-nightly-scheduled-rule
    - *manual-rule
  services:
    - mariadb:10.6
  variables:
    SIMPLETEST_DB: mysql://drupal:drupal@127.0.0.1/drupal
    MYSQL_DATABASE: drupal
    MYSQL_USER: drupal
    MYSQL_PASSWORD: drupal
    MYSQL_ROOT_PASSWORD: root

