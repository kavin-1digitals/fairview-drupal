vitest:
  stage: test
  image: node:20-alpine
  allow_failure: false
  needs: []
  rules:
    - *is-push-rule
    - if: $CI_PIPELINE_SOURCE == "merge_request_event"
      changes:
        - ui/src/**/*
        - ui/tsconfig.json
        - ui/tsconfig.node.json
        - ui/tests/vitest/**/*
        - ui/vitest.config.js
        - ui/vite.config.ts
        - ui/package.json
        - package.json
        - package-lock.json
        # Workspace packages can affect dependency hoisting to the root node_modules.
        - packages/*/package.json
    - *UI-fixtures-files-change-rule
    - *manual-rule
  script:
    - npm ci
    - npm run test --workspace=@drupal-canvas/ui -- --reporter=junit --outputFile=$CI_PROJECT_DIR/ui-vitest-junit.xml
  artifacts:
    expose_as: junit
    expire_in: 6 mos
    when: always
    name: artifacts-$CI_PIPELINE_ID-$CI_JOB_NAME_SLUG
    paths:
      - ui-vitest-junit.xml
    reports:
      junit: ui-vitest-junit.xml

.cypress-base:
  stage: test
  extends:
    - .test-variables
  before_script:
    - echo -e "\e[0Ksection_start:`date +%s`:Cypress-deps[collapsed=true]\r\e[0KInstall Cypress dependencies."
    # Remove Yarn repository to avoid GPG key errors (we use npm, not yarn)
    - sudo rm -f /etc/apt/sources.list.d/yarn.list
    - sudo apt-get -y update
    - sudo apt-get -y install libgtk2.0-0t64 libgtk-3-0t64 libgbm-dev libnotify-dev libnss3 libxss1 libasound2t64 libxtst6 xauth xvfb alsa-utils pulseaudio
    - echo "pcm.!default { type pulse }" > ~/.asoundrc
    - echo "ctl.!default { type pulse }" >> ~/.asoundrc
    - pulseaudio --system --disallow-exit --disallow-module-loading &
    - echo -e "\e[0Ksection_end:`date +%s`:Cypress-deps\r\e[0K"
    #
    # Copied from `.nightwatch-base`, but converted to use GitLab CI references.
    # 👇
    #
    - !reference [ .drupal-with-dev-dependencies ]
    - !reference [ .drupal-enable-test-modules ]
    - !reference [ .canvas-ui ]
    #
    # 👆
    #
    - echo -e "\e[0Ksection_start:`date +%s`:Cypress-install[collapsed=true]\r\e[0KInstall Cypress."
    - npm ci
    - cd ui
    - cp .env.example .env
    - echo "BASE_URL='${SIMPLETEST_BASE_URL}'" >> .env
    - echo "DB_URL='${DRUPAL_TEST_DB_URL}'" >> .env
    - echo "DRUPAL_TEST_WEBSERVER_USER=www-data" >> .env
    - echo "DRUPAL_ROOT_CORE='${CI_PROJECT_DIR}/_drupal/web/core'" >> .env
    - cat .env
    - mkdir -p $CYPRESS_CACHE_FOLDER /var/www/.npm /home/apache/.cache/fontconfig ~/.cache /usr/share/fonts/ /var/cache/fontconfig
    - chown -R www-data:www-data $CYPRESS_CACHE_FOLDER /var/www/.npm /usr/bin/npm /home/apache/.cache/fontconfig ~/.cache /usr/share/fonts/ /var/cache/fontconfig
    - chmod -R 755 $CYPRESS_CACHE_FOLDER
    - sudo -u www-data CYPRESS_CACHE_FOLDER=$CYPRESS_CACHE_FOLDER npx cypress install
    - sudo -u www-data CYPRESS_CACHE_FOLDER=$CYPRESS_CACHE_FOLDER npx cypress --version
    - echo -e "\e[0Ksection_end:`date +%s`:Cypress-install\r\e[0K"
  variables:
    DRUPAL_PROJECT_FOLDER: "$CI_PROJECT_DIR/_drupal/web/modules/contrib/canvas"
    _TARGET_DB_TYPE: sqlite
    CYPRESS_CACHE_FOLDER: $CI_PROJECT_DIR/_drupal/web/modules/contrib/canvas/ui/cycache
    DRUPAL_TEST_WEBSERVER_USER: www-data
    DRUPAL_TEST_WEBDRIVER_AUTOSTART: true
    DRUPAL_TEST_WEBDRIVER_BINARY: "chromedriver"
    DRUPAL_TEST_WEBDRIVER_BINARY_FLAGS: "--port=9515"
    DRUPAL_TEST_BASE_URL: http://localhost
    DRUPAL_TEST_DB_URL: sqlite://localhost/sites/default/files/.ht.sqlite
    MINK_DRIVER_ARGSP: '["chrome", {"browserName":"chrome", "goog:chromeOptions":{"w3c": true, "args":["--no-sandbox","--ignore-certificate-errors", "--allow-insecure-localhost", "--headless", "--disable-dev-shm-usage", "--disable-gpu"]}}, "http://localhost:9515"]'
    MINK_DRIVER_ARGS_WEBDRIVER: '["chrome", {"browserName":"chrome", "goog:chromeOptions":{"w3c": true, "args":["--no-sandbox","--ignore-certificate-errors", "--allow-insecure-localhost", "--headless", "--disable-dev-shm-usage", "--disable-gpu"]}}, "http://localhost:9515"]'
    SIMPLETEST_BASE_URL: http://localhost
    SIMPLETEST_DB: sqlite://localhost/sites/default/files/.ht.sqlite
  artifacts:
    when: always
    expire_in: 6 mos
    paths:
      - _drupal/web/modules/contrib/canvas/ui/tests/screenshots/**/*.png
    reports:
      junit:
        - _drupal/web/modules/contrib/canvas/ui/junit-*.xml

cypress E2E:
  extends: .cypress-base
  rules: *e2e-ci-job-rules
  parallel: 4
  script:
    - npx cypress run --browser electron --reporter junit --reporter-options "mochaFile=junit-[hash].xml" --spec=`node ./tests/support/parallel.js` 2>&1 | tee cypress.log || EXIT_CODE=$?
    # Auto-retry when known frequent random failures occur.
    - grep "✖.*autocomplete-props" $CI_PROJECT_DIR/_drupal/web/modules/contrib/canvas/ui/cypress.log && exit 112 || true
    - grep "✖.*copy-and-paste" $CI_PROJECT_DIR/_drupal/web/modules/contrib/canvas/ui/cypress.log && exit 112 || true
    - grep "✖.*global-regions-interact" $CI_PROJECT_DIR/_drupal/web/modules/contrib/canvas/ui/cypress.log && exit 112 || true
    - grep "✖.*media-library-component-instance" $CI_PROJECT_DIR/_drupal/web/modules/contrib/canvas/ui/cypress.log && exit 112 || true
    # If no auto-retry was attempted, use the original exit code.
    - exit $EXIT_CODE
  retry:
    max: 2
    exit_codes: 112

cypress unit:
  extends: .cypress-base
  script:
    - npx cypress run --component --browser electron --reporter junit --reporter-options "mochaFile=junit-[hash].xml"
  rules:
    - *is-push-rule
    - if: $CI_PIPELINE_SOURCE == "merge_request_event"
      changes:
        - ui/src/**/*
        - ui/tsconfig.json
        - ui/tsconfig.node.json
        - ui/tests/unit/**/*
    - *UI-fixtures-files-change-rule
    - *manual-rule

lint (php):
  stage: validate
  needs: []
  image: ghcr.io/drupal-canvas/drupal-testing:2.1.1
  variables:
    GIT_DEPTH: 1
    COMPOSER_ROOT_VERSION: 0.0.0
  cache:
    - key: ${CI_PARENT_PROJECT_NAME}-default-${CI_COMMIT_REF_NAME}
      fallback_keys:
        - ${CI_PARENT_PROJECT_NAME}-default-${CI_DEFAULT_BRANCH}
      paths:
        - .cache/composer
        - .cache/npm
        - .cache/astro
        - .cache/tsc
      policy: pull
    - key: ${CI_PARENT_PROJECT_NAME}-phplint-${CI_COMMIT_REF_NAME}
      fallback_keys:
        - ${CI_PARENT_PROJECT_NAME}-phplint-${CI_DEFAULT_BRANCH}
      paths:
        - .cache/phpcs
        - .cache/phpstan
      policy: pull
  before_script:
    - !reference [ .drupal-files-with-dev-dependencies ]
    - mkdir -p test-results
  script:
    # PHPStan doesn't allow multiple outputs, but it will cache the result so
    # the second run is very fast.
    - composer run phpstan -- --error-format=junit > test-results/phpstan.xml || true
    - !reference [ .test_runner ]
    - run_test "composer validate" "composer validate --strict"
    - run_test "phpcs" "composer run phpcs"
    - run_test "phpstan" "composer run phpstan"
    - !reference [ .test_summary ]
    # Regenerate the >=11.3 ignores from scratch — this ensures we avoid manual additions.
    # (Manual additions belong in phpstan.neon; this file should be purely auto-generated ignores.)
    - composer run phpstan-regenerate-ignores-for-11.3-and-higher
    - cp phpstan-11.3-and-higher-ignores.neon test-results/
    - git diff --quiet -- phpstan-11.3-and-higher-ignores.neon && echo "✅ phpstan-11.3-and-higher-ignores.neon in sync." || (echo "❌ phpstan-11.3-and-higher-ignores.neon out of sync." && echo "🙏 Please run composer run phpstan-regenerate-ignores-for-11.3-and-higher or download the file from the CI artifacts, and commit the result." && exit 1)
  after_script:
    - cp -R _drupal/web/modules/contrib/$CI_PARENT_PROJECT_NAME/test-results $CI_PROJECT_DIR/test-results
  artifacts:
    expose_as: 'Static tests report'
    when: always
    expire_in: 6 mos
    paths:
      - test-results/
    reports:
      junit:
        - test-results/phpcs.xml
        - test-results/phpstan.xml

lint (node):
  stage: validate
  needs: []
  image: ghcr.io/drupal-canvas/drupal-testing:2.1.1
  script:
    - npm ci
    - npm run build --workspace=drupal-canvas
    - npm run lint

playwright:
  stage: test
  needs: []
  parallel:
    matrix:
      - SHARD: [ "1/6", "2/6", "3/6", "4/6", "5/6", "6/6" ]
        #PROJECT: [ "chromium", "firefox", "webkit" ]
  rules: *e2e-ci-job-rules
  interruptible: true
  image: ghcr.io/drupal-canvas/drupal-testing:2.1.1
  extends:
    - .test-variables
  cache:
    - key: ${CI_PARENT_PROJECT_NAME}-default-${CI_COMMIT_REF_NAME}
      fallback_keys:
        - ${CI_PARENT_PROJECT_NAME}-default-${CI_DEFAULT_BRANCH}
      paths:
        - .cache/composer
        - .cache/npm
        - .cache/astro
        - .cache/tsc
      policy: pull
    - key: ${CI_PARENT_PROJECT_NAME}-playwright-${CI_COMMIT_REF_NAME}
      fallback_keys:
        - ${CI_PARENT_PROJECT_NAME}-playwright-${CI_DEFAULT_BRANCH}
      paths:
        - .cache/ms-playwright
      policy: pull
  variables:
    GIT_DEPTH: 1
    _TARGET_DB_TYPE: sqlite
    DRUPAL_TEST_BASE_URL: http://localhost
    DRUPAL_TEST_WEBSERVER_USER: www-data
    DRUPAL_TEST_PLAYWRIGHT_SKIP_TEARDOWN: true
    COMPOSER_IGNORE_PLATFORM_REQS:
  before_script:
    - !reference [ .drupal-with-dev-dependencies ]
    - !reference [ .canvas-ui ]
  script:
    - npm ci
    - npm run test:playwright -- --shard=$SHARD
  after_script:
    - cp -R _drupal/web/modules/contrib/$CI_PARENT_PROJECT_NAME/blob-report $CI_PROJECT_DIR/blob-report
  artifacts:
    when: always
    expire_in: 1 day
    paths:
      - blob-report/

playwright-reports:
  stage: report
  rules: *e2e-ci-job-rules
  needs:
    - playwright
  when:
    always
  image: ghcr.io/drupal-canvas/drupal-testing:2.1.1
  script:
    - mkdir -p test-results
    - npx playwright merge-reports --reporter=html ./blob-report
    - npx playwright merge-reports --reporter=junit ./blob-report > test-results/playwright.xml
    - |
      cat > test-results/links.json << EOF
      {
        "playwright": [
          {
            "external_link": {
              "label": "Playwright test report",
              "url": "https://${CI_PROJECT_NAMESPACE}.${CI_PAGES_DOMAIN:-pages.drupalcode.org}/-/${CI_PROJECT_NAME}/-/jobs/${CI_JOB_ID}/artifacts/playwright-report/index.html"
            }
          }
        ]
      }
      EOF
  artifacts:
    expose_as: 'Playwright Test Reports'
    when: always
    expire_in: 6 mos
    paths:
      - playwright-report/
      - test-results/
    reports:
      junit:
        - test-results/playwright.xml
      annotations: test-results/links.json

CLI Test:
  stage: test
  image: ghcr.io/drupal-canvas/drupal-testing:2.1.1
  needs: []
  rules:
    - *e2e-tests-must-not-be-disabled-rule
    - changes:
        - "packages/cli/**/*"
        - package.json
        - package-lock.json
        - openapi.yml
        # Everything below is a subset of .backend-files-change-rule.
        - src/Entity/**/*
        - src/Controller/**/*
        # CLI Test checks these components so changes may affect test results.
        - tests/modules/canvas_test_code_components/**/*
    - if: '$CI_COMMIT_TAG =~ /^cli-\d+\.\d+\.\d+(-\w+\d*)?$/'
    - *data-integrity-files-change-rule
    - *manual-rule
  variables:
    GIT_DEPTH: 1
    _TARGET_DB_TYPE: sqlite
    TEST_CANVAS_CLIENT_ID: cli
    TEST_CANVAS_CLIENT_SECRET: secret
    DRUPAL_TEST_WEBSERVER_USER: www-data
    DRUPAL_TEST_BASE_URL: http://localhost
  before_script:
    - !reference [ .drupal-with-dev-dependencies ]
    - !reference [ .canvas-ui ]
    - mkdir -p test-results
  # This job must pass, but must also not disrupt Canvas's CI if dependencies have a security vulnerability.
  allow_failure:
    exit_codes:
      # `npm audit …` fails (implies upstream security vulnerability that may or may not affect Canvas)
      - 100
  script:
    - npm ci
    - npm run test --workspace=@drupal-canvas/cli
    - npm run build --workspace=@drupal-canvas/cli
    - npm version 0.0.1 --workspace=@drupal-canvas/cli
    - npm pack --pack-destination=test-results --workspace=@drupal-canvas/cli
    - npm audit --audit-level=moderate --production || exit 100
  artifacts:
    expose_as: 'CLI package'
    when: always
    expire_in: 6 mos
    paths:
      - test-results/

CLI Publish:
  stage: publish
  image: node:20-alpine
  needs:
    - lint (node)
    - CLI Test
  rules:
    - if: '$CI_COMMIT_TAG =~ /^cli-\d+\.\d+\.\d+(-\w+\d*)?$/'
  before_script:
    - echo "//registry.npmjs.org/:_authToken=${NPM_TOKEN}" > ~/.npmrc
  script:
    - npm ci
    - npm run build --workspace=@drupal-canvas/cli
    - npm version $(echo ${CI_COMMIT_TAG} | cut -c5-) --workspace=@drupal-canvas/cli
    - npm publish --access public --workspace=@drupal-canvas/cli

# User facing documentation.
pages-mr:
  image: node:22
  stage: publish
  needs: []
  rules:
    - if: $CI_PIPELINE_SOURCE == "merge_request_event"
      changes:
        - "docs/user/**/*"
  variables:
    ASTRO_SITE: https://project.pages.drupalcode.org
    ASTRO_BASE: /$CI_PARENT_PROJECT_NAME/mr-$CI_MERGE_REQUEST_IID/
  script:
    - npm ci
    - npm run build --workspace=docs
  pages:
    publish: docs/user/dist
    path_prefix: "mr-$CI_MERGE_REQUEST_IID"
    expire_in: 1 month
  environment:
    name: pages/mr-$CI_MERGE_REQUEST_IID
    url: $CI_PAGES_URL
    on_stop: stop-pages-mr

stop-pages-mr:
  stage: publish
  needs: []
  rules:
    # Branch merge.
    - if: $CI_COMMIT_BRANCH == $CI_DEFAULT_BRANCH && $CI_MERGE_REQUEST_IID
      changes:
        - "docs/user/**/*"
    # Branch deletion.
    - if: $CI_PIPELINE_SOURCE == "push" && $CI_COMMIT_BEFORE_SHA != "0000000000000000000000000000000000000000" && $CI_COMMIT_SHA == "0000000000000000000000000000000000000000"
      changes:
        - "docs/user/**/*"
  script:
    - echo "Stopping pages deployment for MR $CI_MERGE_REQUEST_IID"
  environment:
    name: pages/mr-$CI_MERGE_REQUEST_IID
    action: stop

pages-publish:
  image: node:22
  stage: publish
  needs: []
  rules:
    - if: $CI_COMMIT_BRANCH == $CI_DEFAULT_BRANCH
      changes:
        - "docs/user/**/*"
  variables:
    ASTRO_SITE: https://$CI_PAGES_HOSTNAME
    ASTRO_BASE: /$CI_PROJECT_NAME/
  script:
    - npm ci
    - npm run build --workspace=docs
  pages:
    publish: docs/user/dist

release:
  # For release flow details, see docs/release-process.md.
  stage: publish
  image: ghcr.io/drupal-canvas/drupal-testing:2.1.1
  needs: []
  rules:
    - if: $CI_COMMIT_TAG =~ /^v\d+\.\d+\.\d+$/
  before_script:
    - export VERSION=$(echo ${CI_COMMIT_TAG} | cut -c2-)
    - git config --global user.email "no-reply@drupal.org"
    - git config --global user.name "drupal.org GitLab CI"
    - git remote set-url origin https://gitlab-ci-token:${GITLAB_CI_RELEASE_TOKEN}@${CI_SERVER_HOST}/${CI_PROJECT_PATH}.git
  script:
    - |
      npm ci
      cd ui
      npm version $VERSION --allow-same-version --no-git-tag-version
      npm run build
      cd ..
    - echo "!/ui/dist" >> .gitignore
    - echo "!/packages/astro-hydration/dist" >> .gitignore
    - git add .gitignore
    - git add ui/dist
    - git add ui/package.json
    - git add packages/astro-hydration/dist
    - git commit -m "Add built assets for release ${VERSION}"
    - git tag -f $VERSION
    - git push origin $VERSION
    - git archive --format=zip --prefix="${CI_PROJECT_NAME}-${VERSION}/" HEAD > ${CI_PROJECT_NAME}-${VERSION}.zip
  artifacts:
    expose_as: 'Release archive'
    paths:
      - '${CI_PROJECT_NAME}-${VERSION}.zip'
    expire_in: never
