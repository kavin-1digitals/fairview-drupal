services:
  _defaults:
    autowire: true

  easy_encryption_admin.access.private_key_storage_migrator:
    class: Drupal\easy_encryption_admin\Access\PrivateKeyStorageMigratorAccessCheck
    arguments:
      - '@Drupal\easy_encryption\Sodium\PrivateKeyStorageMigrator'
    tags:
      - { name: access_check, applies_to: _custom_access }

  logger.channel.easy_encryption_admin:
    class: Drupal\Core\Logger\LoggerChannel
    arguments: ['easy_encryption_admin']
    tags:
      - { name: logger.channel }
